planner_node:
  ros__parameters:
    llm_client:
      vendor: 'gemini'
      api_key_variable_name: 'GOOGLE_API_KEY'
      model_name: 'gemini-flash-latest'
      temperature: 1.5
      max_tokens: 6000
    action_backend: 'moveit'
    planner_type: 'forecast' # doremi, monologue, forecast
    forecast:
      feedback_mode: 'continious' # once or continious
      system_prompt: |
        You are an expert roboticist and planner. Your mission is to guide a robot to perform a pick-and-place task in an environment with two robots. You control one robot; the other robot is also picking cubes of different colors. Your goal is to pick a all cubes and place them at a target location.
        You are controlling the manipulator with the green mark
      use_image: True
      image_topic: '/gripper_camera/image'
      output_format: ForecastPlan # class to import from planning_outputs_format.py
      planning_prompt: |
        Robot Control (ONLY these actions are allowed):
        You are controlling the manipulator with the green mark 
          Available colors: ['red', 'blue', 'green', 'yellow', 'purple', 'cyan', 'orange', 'black', 'grey']
          - pick(color): Grasp a cube of that color.
          - place(): Place the currently held cube at location.
          - pitch_retract(angle_in_rad): retract the manipulator in the negative pitch direction the angle should be in radians
          - done(): Use ONLY immediately after a you have completed your task
        Your Task:
            Analyze and generate a step-by-step plan using the available actions to safely and efficiently place ALL the cubes on the table. Present the plan as a numbered list in this format:
            Action(Parameter)
            Always include the done() action as the final step when the goal is reached.
            Additionally, for the first action, predict ONE possible future preconditions that might fail before or during the execution of that action.
            Output these predicted future precondition as a separate list after the plan.
            Lastly, you must select a fallback action that can be executed immediately whenever replanning is required, to keep the robot in a safe state while a new plan is being generated.

        Format:
          Plan:
          1. action(parameter)
          2. action(parameter)
          ...
          N. done()
          Future Preconditions at Risk:
          - pick(black): trajectory_clear may fail if other robot intercept your trajectory in the future
          - None: if no precondition at risk found for the task
          Fallback action:
          action(parameter)

        Examples:
          Target = black
          Plan:
          1. pick(black)
          2. place()
          Future Preconditions at Risk:
          - pick(black): trajectory_clear may fail if other robot arm enters workspace in the future
          Fallback action:
          pitch_retract(0.785398)

          Replanning (pick(black) failed: cube missing):
          Plan:
          1. pick(black)
          2. place()
          Future Preconditions at Risk:
          - pick(black): trajectory_clear may fail if other robot intercept your trajectory in the future
          Fallback action:
          pitch_retract(0.785398)

          Replanning (pick(black) succeeded):
          Plan:
          1. place()
          Future Preconditions at Risk:
          - place(): trajectory_clear may fail if other robot moves in in the future
          Fallback action:
          pitch_retract(0.785398)

          Replanning (place() succeeded):
          Plan:
          1. pick(blue)
          Future Preconditions at Risk:
          - done(): None
          Fallback action:
          pitch_retract(0.785398)
      # available plugins are last_action, feedback_output, 
      replan_prompt_plugins: ['last_action', 'feedback_output'] 
      replan_prompt: |
        You are replanning. The last action executed was: {last_action}.
        The feedback received for this action was: {feedback_output}.
        
        CRITICAL REPLANNING RULES:
        1. If the last action was pick(color) and it SUCCEEDED:
           - You MUST execute place() next. Do NOT pick another cube.
           - The robot is currently holding a cube and cannot pick another until it places the current one.
        
        2. If the last action was place() and it SUCCEEDED:
           - You MUST pick a NEW cube that is still visible on the table in the current image.
           - Do NOT attempt to pick cubes that are no longer visible in the image (they may have been picked by the other robot).
           - Carefully analyze the current camera image to see which cubes remain available.
        
        3. If an action FAILED:
           - Analyze the current image to understand why (e.g., cube missing, trajectory blocked).
           - If a cube is missing from the table, assume the other robot took it and choose a DIFFERENT cube that IS visible.
           - Do NOT retry the same action unless you can see in the image that the conditions have changed.
        
        4. Always prioritize cubes that are clearly visible in the current camera image.
        
        5. If ALL cubes have been picked and placed (none visible on table), execute done().
        
        Use the current scene information (camera image) to verify which cubes are still available before planning your next action.
        Remember you are controlling the manipulator with the green part.
        
        Based on the above rules and the current image, generate your next plan.
    monologue:
      feedback_mode: 'once' # once or continious
      system_prompt: |
        You are an expert roboticist and planner. Your mission is to guide a robot to perform a pick-and-place task in an environment with two robots. You control one robot; the other robot is also picking cubes of different colors. Your goal is to pick a all cubes and place them at a target location.
      use_image: True
      image_topic: '/gripper_camera/image'

      output_format: MonologuePlan # class to import from planning_outputs_format.py

      planning_prompt: |
        Robot Control:
            Available colors: ['red', 'blue', 'green', 'yellow', 'purple', 'cyan', 'orange', 'black', 'grey']
          - place(): Place the currently held cube at location.
          - done(): Use ONLY immediately after a you have completed your task
        Task:
            You will receive two sources of feedback from the environment:
            1. An image: First, analyze the image and extract relevant information from the environment that may impact the mission.
            2. A failure/success signal: After the execution of each action, you will receive a signal indicating whether the action succeeded or failed.

            Analyze the situation and generate only the next best action for the robot to execute using the available actions to safely and efficiently pick all cubes and place them in the target location. 
            Use an inner monologue strategy: always try to analyze the situation by asking yourself how the sources of feedback (image and success/failure signals) might impact the plan. 
            Consider how you can use this feedback to improve or adapt the plan and increase the chances of success in the mission.
            Present the next action in this format:     
            Action(Parameter)
            Always include the done() action as the final step when the goal is reached.
        Format:
          Next action:
          1. action(parameter)

        Examples:
          Next action:
          1. pick(black)

          You are replanning. The last action executed was: pick(black).
          The feedback received for this action was: There was an error executing the action
          Use this information to decide the next best step for the robot to reach its goal.
          Next action:
          1. pick(blue)

          You are replanning. The last action executed was: pick(blue).
          The feedback received for this action was: The action was successfully executed
          Use this information to decide the next best step for the robot to reach its goal.
          Next action:
          1. place()

          Replanning (place() succeeded)

         You are replanning. The last action executed was: place().
         The feedback received for this action was: The action was successfully executed
         Use this information to decide the next best step for the robot to reach its goal.

          Next action:
          Since there are no more cubes to pick:
          1. done()

      # available plugins are last_action, feedback_output, 
      replan_prompt_plugins: ['last_action', 'feedback_output'] 
      replan_prompt: |
          You are replanning. The last action executed was: {last_action}.
          The feedback received for this action was: {feedback_output}.
          Use this information to decide the next best step to advance the pick-and-place task.
    doremi:
      feedback_mode: 'continious' # once or continious
      system_prompt: |
        You are an expert roboticist and planner. Your mission is to guide a robot to perform a pick-and-place task in an environment with two robots. You control one robot; the other robot is also picking cubes of different colors. Your goal is to pick a all cubes and place them at a target location.
      use_image: True
      image_topic: '/gripper_camera/image'

      output_format: DoReMiPlan # class to import from planning_outputs_format.py

      planning_prompt: |
        Robot Control (ONLY allowed):
          Available colors: ['red', 'blue', 'green', 'yellow', 'purple', 'cyan', 'orange', 'black', 'grey']
          - pick(color)
          - place()
          - done()
        Task:
          Provide a numbered plan: pick target cube -> place -> done.
          FIRST action only: list at-risk preconditions (E.g location_clear, path_clear).
          Avoid interference with the other robot. Do NOT output actions outside the allowed set.
       
        You are controlling the Green marked manipulator
        you might want to start with the red cube
        IMPORTANT: Only output done() after a successful place().

        Format:
          Plan:
          1. action(parameter)
          2. action(parameter)
          ...
          N. done()
          Preconditions at Risk:
          - pick(red): path_clear may fail if other robot collides with the manipulator
          - None

        Example (target=red):
          Plan:
          1. pick(red)
          2. place()
          Preconditions:
            - pick(red): path_clear

          Replanning (pick(red) failed: cube missing):
          Plan:
          1. pick(red)
          2. place()
          Preconditions:
            - pick(red): path_clear

          Replanning (pick(red) succeeded):
          Plan:
          1. place()
          Preconditions:
            - place(): location_clear

          Replanning (place() succeeded):
          Plan:
          1. pick(black)
          Preconditions:
            - pick(black): no_interference
      # available plugins are last_action, feedback_output, 
      replan_prompt_plugins: ['last_action', 'feedback_output'] 
      replan_prompt: |
          You are replanning. The last action executed was: {last_action}.
          The feedback received for this action was: {feedback_output}.
          Use this information to decide the next best step to complete the pick-and-place task.
          IMPORTANT: Only say "done()" if you are absolutely certain the required cube has been placed correctly and the task is fully completed. If there is any doubt, do not use "done()" yet.

feedback_node:
  ros__parameters:
    llm_client:
      vendor: 'gemini'
      api_key_variable_name: 'GOOGLE_API_KEY'
      model_name: 'gemini-flash-lite-latest'
      temperature: 1.0
      max_tokens: 2000
    feedback_type: 'forecast'  # doremi monologue forecast
    forecast:
      probability_threshold: likely
      system_prompt: |
        You are assisting a robot by analyzing and FORECASTING its environment to determine if other robots or dynamic agents could impact the success of its ongoing action. 
        Your goal is to predict the likely future states of all dynamic agents (robots, people, animals, vehicles, moving objects) within the next second, based on their current state, velocities, and behaviors.
        You may imagine likely movements and interactions even if you do not have perfect certainty. Your task is to forecast potential precondition failures for the next second.
      image_topic: '/gripper_camera/image'
      prompt: | # you must have a {feedback_input}

        Current action and preconditions: {feedback_input}

        You are a robot forecaster. Your goal is to predict if any precondition for the current action will fail or be at risk within the NEXT SECOND based on predicted agent (robot/manipulator) motion.

        Key Focus Areas: Analyze proximity, motion direction, and workspace contention.

        Is there a credible risk of path overlap, occlusion, or interference within the next second?

        IMPORTANT: For each precondition, assess the risk and select EXACTLY ONE category that best describes the situation. Use these semantic definitions to guide your choice:

          - "very likely" => Collision or interference is IMMINENT and UNAVOIDABLE within the next second.
            Example: Both manipulators are actively moving toward the exact same point in space; trajectories will definitely intersect.
          
          - "likely" => High risk of interference; collision will occur UNLESS one robot changes course or stops.
            Example: The other robot is moving directly into this robot's planned trajectory path and will intersect if it continues.
          
          - "neutral" => Moderate uncertainty; agents are in proximity but trajectories may or may not conflict.
            Example: Another manipulator is nearby and moving, but the direction is not yet clearly converging or diverging from this robot's path.
          
          - "improbable" => Low risk; agents are in the general workspace but clearly on non-conflicting paths.
            Example: The other robot is visible in the workspace but moving away or perpendicular to this robot's trajectory.
          
          - "very improbable" => Negligible risk; no dynamic agents near the workspace or all agents are stationary/far away.
            Example: The other robot is idle in its home position, or no other agents are visible in the camera view.

        Additional rules:
          - For each precondition, return exactly one entry with a single "probability_of_failure" category.
          - Choose the category that BEST matches the current scene and predicted motion within the next second.
          - Do NOT hedge by returning multiple categories for the same precondition.
          - Keep the "explanation" field concise (one short sentence describing what you observed).
          - Preserve the JSON structure below exactly; do not add extra top-level keys.

        Answer Format: Output ONLY a valid JSON object with the following structure. Do not include any text before or after the JSON.

        {
          "preconditions": [
            {
              "name": "precondition_name",
              "probability_of_failure": "probability_category",
              "explanation": "brief explanation of the risk (e.g., proximity, path overlap, occlusion)"
            }
          ]
        }

        Minimal Example JSON Output (illustrative - follow exact keys above):
        {
          "preconditions": [
            {
              "name": "trajectory_clear",
              "probability_of_failure": "very likely",
              "explanation": "Both manipulators are converging toward the same workspace and contact is likely within the next second."
            },
            {
              "name": "trajectory_clear",
              "probability_of_failure": "improbable",
              "explanation": "Another agent is nearby but moving away; short-term interference is unlikely."
            }
          ]
        }
    monologue:
      system_prompt: |
        You are assisting a robot by analyzing its environment to determine if an action was successfully executed.
      image_topic: '/gripper_camera/image'
      prompt: | # {feedback_input} will be the last action
        Current action to check: {feedback_input}

        Your task: Evaluate whether the robot has successfully completed the specified pick-and-place action.
        
        You are currently evaluating the scene for the GREEN MARKED MANIPULATOR ONLY
        Analyze the current scene assess if the expected outcome of the action is clearly visible. For instance, a successful pick(color) action means the colored cube is clearly grasped by the robot's end-effector.
        For place() actions, a failed outcome the robot is colliding, otherwise place always was a success (YES).
        
        IMPORTANT: If the robot is colliding or in contact with another agent (robot, manipulator, obstacle), the action has FAILED, regardless of whether the pick or place seems to have been executed.

        Answer format:
        - Yes: if the action was successfully completed, based on the image, AND there is no collision with other agents.
        - No: if the action was not completed, is ambiguous, the outcome is not visible, OR the robot is colliding with another agent.

        Example answers:
        - pick(red): Yes The cube is on the robots gripper and there is no collision
        - pick(red): No The cube is still on the table
        - pick(red): No The robot is colliding with the other manipulator
        - pick(blue): Yes The cube is on the robots gripper and there is no collision
        - place(): Yes cube was placed correcly and there is no collision

        Answer:
    doremi:
      system_prompt: |
        You are assisting a robot by analyzing its environment to determine if the other robot or any dynamic agent could impact the success of its ongoing pick-and-place action.
      image_topic: '/gripper_camera/image'
      prompt: | # you must have a {feedback_input}
        Current action and preconditions to check: {feedback_input}

        Your task: For each precondition in the list above, determine whether it is currently being violated based on the scene observed from the robot's camera. You are focusing on the GREEN MARKED MANIPULATOR ONLY

        Focus ONLY on the specific precondition itself—do not consider unrelated factors or speculate beyond what is directly relevant to the precondition. Pay special attention to the position and actions of the other agents, as interference or collision must be avoided.

        For each precondition, carefully analyze the image and ask yourself: Is there evidence that this precondition is not satisfied right now? For example, for "path_clear", check if the other robot is blocking the trajectory

        Answer format:
        - For each precondition, start your answer with "Yes" or "No", followed by a brief explanation.

        Example answers:
        - path_clear(): Yes, The action had to be canceled due to the other is located in the current robot trajectory
        - arm_free: No, there are no visible obstacles near the robot’s arm.

        Answer:

