feedback_node:
  ros__parameters:
    ttc:
      scan_topic: 'scan_raw'
      forward_start_index: 200
      forward_end_index: 465
      valid_min_distance_m: 0.1
      valid_max_distance_m: 3.0
      safety_distance_m: 0.5
      horizon_s: 1.0
      min_closing_speed_mps: 0.05
    llm_client:
      vendor: 'gemini'
      api_key_variable_name: 'GOOGLE_API_KEY'
      model_name: 'gemini-flash-lite-latest'
      temperature: 1.0
      max_tokens: 750
    feedback_type: 'forecast'  # doremi monologue forecast
    forecast:
      probability_threshold: neutral
      system_prompt: |
        You are assisting a robot by analyzing and FORECASTING its environment to determine if people (humans) present or moving within the scene could impact the success of its ongoing action.
      image_topic: '/head_front_camera/image'
      prompt: | # you must have a {feedback_input}
        Current action and preconditions to check: {feedback_input}

          Your task: For each precondition in the list above, predict whether it will hold at this action.

          Consider the current scene as observed from the mobile robot’s camera, and analyze the predicted future states of all dynamic agents (e.g., people, animals, vehicles, or any moving entities) within the NEXT SECOND.

          IMPORTANT: Only answer "very likely" if you are absolutely certain—based on strong, clear evidence—that a dynamic agent will violate the precondition in the predicted future state. Do NOT answer "very likely" for unlikely, ambiguous, or low-probability risks.

          Ask yourself for each precondition: Is there a high probability, with clear and convincing evidence, that the predicted future states of any dynamic agent will interfere with the predicted future state of the currently executing action within the NEXT SECOND, causing that precondition to fail? 
          
          Assess the risk level based on these predictions. Use "likely" or "very likely" if motions create a clear risk of interference.

          Use "neutral" or "improbable" if agents are nearby but their predicted paths are clearly diverging or non-conflicting.

          Failure Risk Categories: "very improbable", "improbable", "neutral", "likely", "very likely"

        Answer Format: Output ONLY a valid JSON object with the following structure. Do not include any text before or after the JSON.

          {
            "preconditions": [
              {
                "name": "precondition_name",
                "probability_of_failure": "probability_category",
                "explanation": "brief explanation of the risk (e.g., proximity, path overlap, occlusion)"
              }
            ]
          }

          Example JSON Output:
          {
            "preconditions": [
              {
                "name": "path_clear",
                "probability_of_failure": "very likely",
                "explanation": "A person is walking directly toward the robot's path; collision is imminent within the next second."
              }
            ]
          }

          {
            "preconditions": [
              {
                "name": "path_clear",
                "probability_of_failure": "likely",
                "explanation": "A person is moving laterally and may enter the robot's navigation path within the next second."
              }
            ]
          }

          {
            "preconditions": [
              {
                "name": "path_clear",
                "probability_of_failure": "neutral",
                "explanation": "A person is present in the vicinity but their trajectory is parallel to the robot's path."
              }
            ]
          }

          {
            "preconditions": [
              {
                "name": "path_clear",
                "probability_of_failure": "improbable",
                "explanation": "A person is nearby but moving away from the robot's planned trajectory."
              }
            ]
          }

          {
            "preconditions": [
              {
                "name": "path_clear",
                "probability_of_failure": "very improbable",
                "explanation": "No dynamic agents are near the navigation path; interference is extremely unlikely."
              }
            ]
          }
    monologue:
      system_prompt: |
        You are assisting a robot by analyzing its environment to analize if an action was successfully executed.
      image_topic: '/head_front_camera/image'
      prompt: | # {feedback_input} will be the last action
        Current action to check: {feedback_input}

        Your task: Evaluate whether the robot has successfully completed the specified action.

        Analyze the current scene as observed from the mobile robot’s camera. Assess if the expected outcome of the action is clearly visible. For instance, a successful move_to(target) action means the target object or location is visible anywhere within the camera's view, indicating the robot is in the vicinity of the target.
        For pick(target) actions, a successful outcome means the target object is clearly grasped by the robot’s end-effector and is no longer at its original location in the scene.

        Answer format:
        - Yes: if the action was clearly and successfully completed, based on the image.
        - No: if the action was not completed, is ambiguous, or the outcome is not visible.

        Example answers:
        - move_to(sofa): Yes
        - move_to(sofa): No
        - pick(cup): Yes
        - pick(cup): No

        Answer:
    doremi:
      system_prompt: |
        You are assisting a robot by analyzing and its environment to determine if people (humans) could impact the success of its ongoing action.
      image_topic: '/head_front_camera/image'
      prompt: | # you must have a {feedback_input}
        Current action and preconditions to check: {feedback_input}

          Your task: For each precondition in the list above, determine whether it is currently being violated based on the scene observed from the robot's camera.

          Focus ONLY on the specific precondition itself—do not consider unrelated factors or speculate beyond what is directly relevant to the precondition.

          For each precondition, carefully analyze the image and ask yourself: Is there evidence that this precondition is not satisfied right now? For example, for "path_clear", check if there is any obstacle (such as a person or object) blocking the robot's path.

          Answer format:
          - For each precondition, start your answer with "Yes" or "No", followed by a brief explanation.

          Example answers:
          - path_clear(): Yes, The action had to be canceled due to the preconditions were violated
          - arm_free: No, there are no visible obstacles near the robot’s arm.

          Answer:

