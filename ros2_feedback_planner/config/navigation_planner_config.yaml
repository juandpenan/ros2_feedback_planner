planner_node:
  ros__parameters:
    llm_client:
      vendor: 'gemini'
      api_key_variable_name: 'GOOGLE_API_KEY'
      model_name: 'gemini-flash-latest'
      temperature: 0.5
      max_tokens: 6000
    action_backend: 'nav2'
    deterministic:
      destination: 'bed'
      backup_distance_m: 0.5
    planner_type: 'forecast' # doremi, monologue todo(juandpenan): rename current to method name when name is clear
    forecast:
      feedback_mode: 'continious' # once or continious
      system_prompt: |
        You are an expert roboticist and planner. Your mission is to guide a mobile robot to reach a specific target location in an apartment.
      use_image: True
      image_topic: '/head_front_camera/image'

      output_format: ForecastPlan # class to import from planning_outputs_format.py

      planning_prompt: |
        Robot Control:
          You can command the robot using these actions:
          - move_forward(distance_in_m): Moves the robot straight along its local X-axis.
          - move_backwards(distance_in_m): Moves the robot straight backwards along its local X-axis.
          - move_to(place): A high-level action that commands the robot to navigate directly to a specified place (e.g., bed, kitchen). The robot autonomously determines the necessary sequence of primitive actions (such as moving forward, turning, etc.) to reach the target location. This abstracts away the low-level motion planning from the user, allowing for more intuitive goal specification.
          - move_right(distance_in_m): Moves the robot laterally to its right, typically by rotating and then moving forward along its local negative Y-axis.
          - move_left(distance_in_m): Moves the robot laterally to its left, typically by rotating and then moving forward along its local positive Y-axis.
          - turn_left(angle_in_radians): Rotates the robot anti-clockwise  I.E if the robot turns left 90 the X-axis will be located where the Y-axis  is now. 
          - turn_right(angle_in_radians): Rotates the robot clockwise. I.E if the robot turns right 90 the Y-axis will be located where the X-axis is now.
          - done()
        Your Task:
            Analyze and generate a step-by-step navigation plan using the available actions to safely and efficiently reach the bed. Present the plan as a numbered list in this format:
            Action(Parameter)
            Always include the done() action as the final step when the goal is reached.
            Additionally, for the first action, predict any possible future preconditions that might fail before or during the execution of that action.
            Output these predicted future preconditions as a separate list after the plan.
            Lastly, you must select a fallback action that can be executed immediately whenever replanning is required, to keep the robot in a safe state while a new plan is being generated.


        Format your response as:

          Plan:
          1. action(parameter)
          2. action(parameter)
          ...
          N. done()
          Future Preconditions at Risk:
          - Action1: precondition "path_clear" may fail due to obstacle detected ahead.
          - None: if no precondition at risk found for the task
          Fallback action:
          action(parameter)

         Examples:

         Office Desk
         Plan:
         1. move_to(office_desk)
         2. done()

         Future Preconditions:
          - move_to(office_desk): path_clear
         Fallback action:
          move_backwards(0.35)

        You are replanning. The last action executed was: move_to(office_desk).
        The feedback received for this action was: The action had to be canceled due to the preconditions will not hold
        within the next second
        Use this information to decide the next best step for the robot to reach its goal.

          Plan:
          1. move_to(office_desk)
          3. done()

          Future Preconditions:
          - move_to(office_desk): path_clear
          Fallback action:
          move_backwards(0.35)
        
        You are replanning. The last action executed was: move_backwards(0.2).
        The feedback received for this action was: The action was successfully executed

        Use this information to decide the next best step for the robot to reach its goal.

          Plan:
          1. move_to(office_desk)
          2. done()

          Future Preconditions:
          - move_to(office_desk): path_clear

          Fallback action:
          move_backwards(0.35)

          You are replanning. The last action executed was: move_to(office_desk).
        The feedback received for this action was: The action was successfully executed

        Use this information to decide the next best step for the robot to reach its goal.

          Plan:
          2. done()

          Future Preconditions:
          - done(): None

          Fallback action:
          move_backwards(0.35)


         Sofa
         Plan:
         1. move_to(sofa)
         2. done()

         Future Preconditions:
          - move_to(sofa): path_clear
         Fallback action:
          move_backwards(0.35)
         
          You are replanning. The last action executed was: move_to(sofa)
          The feedback received for this action was: The action was successfully executed
          Use this information to decide the next best step for the robot to reach its goal.
          Plan:
          1.done()
          Future Preconditions:
          - done(): None
          Fallback action:
          move_backwards(0.35)
         
         Shower
         Plan:
         1. move_to(shower)
         2. done()

         Future Preconditions:
          - move_to(shower): path_clear
         Fallback action:
          move_backwards(0.35)

          You are replanning. The last action executed was: move_to(shower).
          The feedback received for this action was: 'The action was successfully executed'
          Use this information to decide the next best step for the robot to reach its goal.
        
         Plan:
         1.done()

         Future Preconditions:
          - done(): None
         Fallback action:
          move_backwards(0.35)

         Fridge
         Plan:
         1. move_to(fridge)
         2. done()

          Future Preconditions:
          - move_to(fridge): path_clear
          Fallback action:
          move_backwards(0.35)
          
          You are replanning. The last action executed was: move_to(fridge).
          The feedback received for this action was: o the preconditions will not hold
                within the next second
          Use this information to decide the next best step for the robot to reach its goal.
          
          Plan:
          1. move_to(fridge)
          3. done()

          Future Preconditions:
          - move_to(fridge): path_clear
          Fallback action:
          move_backwards(0.35)

          You are replanning. The last action executed was: move_backwards(0.2).
          The feedback received for this action was: The action was successfully executed
          Use this information to decide the next best step for the robot to reach its goal.

         Plan:
         1. move_to(fridge)
         2. done()

          Future Preconditions:
          - move_to(fridge): path_clear
          Fallback action:
          move_backwards(0.35)

         Plan:
         1. move_to(fridge)
         2. done()

          Future Preconditions:
          - move_to(fridge): path_clear
          Fallback action:
          move_backwards(0.35)
          
          You are replanning. The last action executed was: move_to(fridge).
          The feedback received for this action was: was successfully executed
          Use this information to decide the next best step for the robot to reach its goal.
        Plan:
         1.done()

        Future Preconditions:
          - done(): None
        Fallback action:
          move_backwards(0.35)

      
      # available plugins are last_action, feedback_output, 
      replan_prompt_plugins: ['last_action', 'feedback_output'] 
      replan_prompt: |
          You are replanning. The last action executed was: {last_action}.
          The feedback received for this action was: {feedback_output}.
          Use this information to decide the next best step for the robot to reach its goal.
