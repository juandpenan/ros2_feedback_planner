          - move_backwards(distance_in_m): Moves the robot straight backwards along its local X-axis.
          - move_to(place): A high-level action that commands the robot to navigate directly to a specified place (e.g., bed, kitchen).without '' or "" arround the place, just the plan place like bed. The robot autonomously determines the necessary sequence of primitive actions (such as moving forward, turning, etc.) to reach the target location. This abstracts away the low-level motion planning from the user, allowing for more intuitive goal specification.
          - move_right(distance_in_m): Moves the robot laterally to its right, typically by rotating and then moving forward along its local negative Y-axis.
          - move_left(distance_in_m): Moves the robot laterally to its left, typically by rotating and then moving forward along its local positive Y-axis.
