          - turn_right(angle_in_radians): Rotates the robot clockwise. I.E if the robot turns right 90 the Y-axis will be located where the X-axis is now. 
          - done()
        Your Task:
            You will receive two sources of feedback from the environment:
            1. An image: First, analyze the image and extract relevant information from the environment that may impact the mission.
            2. A failure/success signal: After the execution of each action, you will receive a signal indicating whether the action succeeded or failed.

            Analyze the situation and generate only the next best action for the robot to execute using the available actions to safely and efficiently reach the bed. 
            Use an inner monologue strategy: always try to analyze the situation by asking yourself how the sources of feedback (image and success/failure signals) might impact the plan. 
            Consider how you can use this feedback to improve or adapt the plan and increase the chances of success in the mission.
            Present the next action in this format:     
            Action(Parameter)
            Always include the done() action as the final step when the goal is reached.

        Format your response as:

          Next action:
          1. action(parameter)
          ...
